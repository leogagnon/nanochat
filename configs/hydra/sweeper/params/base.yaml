horizon.target_param_data_ratio: -1
horizon.target_flops: 1e18, 2.15e18, 4.64e18, 1e19
model.depth: 10, 12, 14, 16, 18, 20

eval.core_metric_every: -1
eval.core_metric_max_per_task: -1
eval.sample_every: -1

# 4 checkpoints every run
log.save_every: -1
log.num_checkpoints: 4

optim.embedding_lr: "${uniform:0.15,0.45}"
optim.unembedding_lr: "${uniform:0.002,0.016}"
optim.weight_decay: "${uniform:0.1,0.5}"
optim.matrix_lr: "${uniform:0.2,0.4}"
optim.scalar_lr: "${uniform:0.3,0.6}"
optim.warmup_steps: "${randint:20,80}"
optim.warmdown_ratio: "${uniform:0.5,0.8}"
optim.final_lr_frac: "${uniform:0.0,0.1}"

log.sweep_id: sweep_0
log.wandb_project: nanochat, nanochat # dummy sweep to get two runs 
