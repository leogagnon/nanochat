defaults:
  - train_schema
  - _self_
  - hydra: base
  - model: null   # override with e.g. model=tiny, model=small, model=base
  - hydra/sweeper/params: null
  - override hydra/launcher: tamia

runtime:
  device_type: ""

log:
  wandb_project: nanochat
  wandb_entity: guillaume-lajoie
  save_every: 100
  num_checkpoints: -1
  model_tag: null
  resume_run_id: null
  sweep_id: null

optim:
  device_batch_size: 32
  total_batch_size: -1
  embedding_lr: 0.3
  unembedding_lr: 0.008
  weight_decay: 0.28
  matrix_lr: 0.02
  scalar_lr: 0.5
  warmup_steps: 40
  warmdown_ratio: 0.65
  final_lr_frac: 0.05
  resume_from_step: -1

horizon:
  num_iterations: -1
  target_flops: -1
  target_tokens: -1
  target_param_data_ratio: 20
  target_time_minutes: -1

fp8:
  enabled: false
  recipe: tensorwise  # tensorwise | rowwise

eval:
  eval_every: -1
  eval_tokens: 41943040  # 80 * 524288
  core_metric_every: -1
  core_metric_max_per_task: 500
  sample_every: -1

model:
  depth: 20
  aspect_ratio: 64
  head_dim: 128
  max_seq_len: 2048
  window_pattern: SSSL
