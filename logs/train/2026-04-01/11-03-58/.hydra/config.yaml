model:
  depth: 20
  aspect_ratio: 64
  head_dim: 128
  max_seq_len: 2048
  window_pattern: SSSL
horizon:
  num_iterations: -1
  target_flops: -1.0
  target_param_data_ratio: 12.0
optim:
  device_batch_size: 32
  total_batch_size: -1
  embedding_lr: 0.3
  unembedding_lr: 0.008
  weight_decay: 0.28
  matrix_lr: 0.02
  scalar_lr: 0.5
  warmup_steps: 40
  warmdown_ratio: 0.65
  final_lr_frac: 0.05
  resume_from_step: -1
fp8:
  enabled: false
  recipe: tensorwise
eval:
  eval_every: 250
  eval_tokens: 41943040
  core_metric_every: 2000
  core_metric_max_per_task: 500
  sample_every: 2000
log:
  run: dummy
  save_every: -1
  model_tag: null
runtime:
  device_type: ''
